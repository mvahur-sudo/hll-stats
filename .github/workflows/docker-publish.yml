name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch: # võimaldab käsitsi käivitada

# Ära käivitu bump commit'idel mis sisaldavad [skip ci]
# (GitHub ei aktsepteeri workflow filterit, aga me kontrollime bump stepis)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          git config user.email "mvahur-sudo@users.noreply.github.com"
          git config user.name "mvahur-sudo"
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          node -e "const p=require('./package.json');p.version='${NEW_VERSION}';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          git add package.json
          git commit -m "Bump version to ${NEW_VERSION} [skip ci]"
          git push
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT

  build-and-push:
    needs: bump-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.bump-version.outputs.new_version }}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
